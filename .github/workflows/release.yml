name: Release Build

env:
  GRADLE_USERNAME: ${{ secrets.GRADLE_USERNAME }}
  GRADLE_PASSWORD: ${{ secrets.GRADLE_PASSWORD }}

on:
  workflow_dispatch:

  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish Fusion Files
        run: gradle fusion-files:publish
      - name: Publish Fusion Core
        run: gradle fusion-core:publish
      - name: Publish Fusion Kyori
        run: gradle fusion-kyori:publish
      - name: Publish Fusion Mojang
        run: gradle fusion-mojang:publish

      - name: Publish Fusion Paper
        run: gradle fusion-paper:publish
      - name: Publish Fusion Velocity
        run: gradle fusion-velocity:publish