name: Release Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make scripts executable
        run: |
          chmod +x ./gradlew
          chmod +x ./publish.sh
      - name: Publish Fusion
        run: ./publish.sh